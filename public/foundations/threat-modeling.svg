<svg xmlns="http://www.w3.org/2000/svg" width="800" height="360" viewBox="0 0 800 360" role="img" aria-label="Threat Modeling">
  <defs>
    <linearGradient id="tmbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ede9fe"/>
      <stop offset="1" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="tmshield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <rect width="800" height="360" fill="url(#tmbg)"/>
  <circle cx="150" cy="80" r="140" fill="#ffffff" opacity="0.28"/>
  <circle cx="690" cy="300" r="120" fill="#7c3aed" opacity="0.06"/>

  <!-- faint attack-tree branches behind the shield -->
  <g stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.25" fill="none">
    <path d="M400 60 L250 130"/>
    <path d="M400 60 L550 130"/>
    <path d="M250 130 L180 210"/>
    <path d="M250 130 L320 210"/>
    <path d="M550 130 L620 210"/>
  </g>
  <g fill="#7c3aed" opacity="0.3">
    <circle cx="400" cy="60" r="9"/>
    <circle cx="250" cy="130" r="8"/>
    <circle cx="550" cy="130" r="8"/>
    <circle cx="180" cy="210" r="8"/>
    <circle cx="320" cy="210" r="8"/>
    <circle cx="620" cy="210" r="8"/>
  </g>

  <!-- shield with a check -->
  <path d="M400 95 L515 135 C515 250 470 300 400 330 C330 300 285 250 285 135 Z"
        fill="url(#tmshield)" stroke="#ffffff" stroke-width="6" stroke-linejoin="round"/>
  <path d="M355 210 L390 248 L455 165" fill="none" stroke="#ffffff"
        stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
