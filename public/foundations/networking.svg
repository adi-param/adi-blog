<svg xmlns="http://www.w3.org/2000/svg" width="800" height="360" viewBox="0 0 800 360" role="img" aria-label="Networking">
  <defs>
    <linearGradient id="netbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eaf7f1"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="netnode" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12a87d"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <rect width="800" height="360" fill="url(#netbg)"/>
  <circle cx="650" cy="70" r="150" fill="#ffffff" opacity="0.25"/>
  <circle cx="120" cy="320" r="120" fill="#2563eb" opacity="0.06"/>

  <!-- links -->
  <g stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.35">
    <line x1="150" y1="120" x2="300" y2="80"/>
    <line x1="150" y1="120" x2="270" y2="250"/>
    <line x1="300" y1="80" x2="450" y2="160"/>
    <line x1="270" y1="250" x2="450" y2="160"/>
    <line x1="450" y1="160" x2="610" y2="95"/>
    <line x1="450" y1="160" x2="470" y2="300"/>
    <line x1="610" y1="95" x2="650" y2="270"/>
    <line x1="650" y1="270" x2="470" y2="300"/>
    <line x1="270" y1="250" x2="470" y2="300"/>
  </g>

  <!-- nodes -->
  <g fill="url(#netnode)" stroke="#ffffff" stroke-width="4">
    <circle cx="150" cy="120" r="17"/>
    <circle cx="300" cy="80" r="15"/>
    <circle cx="270" cy="250" r="15"/>
    <circle cx="450" cy="160" r="22"/>
    <circle cx="610" cy="95" r="15"/>
    <circle cx="650" cy="270" r="17"/>
    <circle cx="470" cy="300" r="15"/>
  </g>
</svg>
